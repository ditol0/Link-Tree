<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">روابطنا | عمو روبيان</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Changa:wght@600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="img/WhatsApp Image 2026-04-19 at 7.43.03 PM.jpeg" type="image/png">
    <style>
        :root {
            --bg-1: #10211b;
            --bg-2: #1d3a30;
            --card: rgba(250, 245, 233, 0.1);
            --card-border: rgba(255, 255, 255, 0.22);
            --title: #f8e3aa;
            --text: #f6f0dd;
            --muted: #d6ceb8;
            --accent: #e6bf6d;
            --accent-2: #c8943f;
            --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Cairo", sans-serif;
            background: radial-gradient(circle at 15% 20%, #345d50 0%, transparent 35%),
                        radial-gradient(circle at 80% 10%, #74603c 0%, transparent 27%),
                        linear-gradient(145deg, var(--bg-1), var(--bg-2));
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px 14px;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(10px);
            z-index: -1;
        }

        body::before {
            width: 220px;
            height: 220px;
            background: rgba(255, 207, 112, 0.2);
            top: -40px;
            right: -60px;
        }

        body::after {
            width: 300px;
            height: 300px;
            background: rgba(112, 200, 171, 0.18);
            bottom: -100px;
            left: -100px;
        }

        .page {
            width: min(740px, 100%);
            backdrop-filter: blur(8px);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.05));
            border: 1px solid var(--card-border);
            border-radius: 30px;
            box-shadow: var(--shadow);
            padding: 28px;
            animation: rise-in 800ms cubic-bezier(.2,.8,.2,1);
        }

        .brand {
            text-align: center;
            margin-bottom: 22px;
        }

        .lang-switch {
            display: flex;
            justify-content: flex-start;
            gap: 8px;
            margin-bottom: 14px;
        }

        .lang-btn {
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border-radius: 999px;
            padding: 7px 12px;
            font: inherit;
            font-size: 0.84rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 180ms ease, transform 180ms ease;
        }

        .lang-btn:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.14);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #1f2b24;
            border-color: transparent;
        }

        .avatar-wrap {
            width: 118px;
            height: 118px;
            margin: 0 auto 14px;
            padding: 4px;
            border-radius: 999px;
            background: conic-gradient(from 160deg, #f8e7b9, #cf9951, #f8e7b9);
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 999px;
            border: 3px solid rgba(255, 255, 255, 0.7);
            object-fit: cover;
            display: block;
            background: #cfcfcf;
        }

        .title {
            margin: 0;
            font-family: "Changa", sans-serif;
            font-size: clamp(1.6rem, 3.5vw, 2rem);
            color: var(--title);
            letter-spacing: 0.5px;
        }

        .subtitle {
            margin: 8px auto 0;
            max-width: 540px;
            color: var(--muted);
            line-height: 1.7;
            font-size: 0.97rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin: 20px 0 24px;
        }

        .chip {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            text-align: center;
            padding: 10px 8px;
            font-size: 0.88rem;
        }

        .chip strong {
            display: block;
            color: #ffe9b4;
            font-size: 1.05rem;
            margin-bottom: 2px;
        }

        .links {
            display: grid;
            gap: 12px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .link-card {
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.06));
            border: 1px solid var(--card-border);
            border-radius: 17px;
            padding: 14px 16px;
            transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
            animation: float-up 700ms ease backwards;
        }

        .links li:nth-child(1) .link-card { animation-delay: 100ms; }
        .links li:nth-child(2) .link-card { animation-delay: 180ms; }
        .links li:nth-child(3) .link-card { animation-delay: 260ms; }

        .link-card:hover {
            transform: translateY(-3px) scale(1.01);
            border-color: rgba(250, 214, 135, 0.78);
            box-shadow: 0 16px 28px rgba(0, 0, 0, 0.28);
        }

        .link-main {
            display: flex;
            align-items: center;
            gap: 11px;
            font-size: 1rem;
            font-weight: 700;
        }

        .icon {
            width: 38px;
            height: 38px;
            border-radius: 11px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #1f2b24;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
            flex-shrink: 0;
        }

        .icon svg,
        .icon .icon-img {
            width: 20px;
            height: 20px;
            display: block;
            filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.2));
            transition: transform 220ms ease;
        }

        .icon .snap-img {
            object-fit: contain;
            filter: none;
        }

        .link-card:hover .icon svg,
        .link-card:hover .icon .icon-img {
            transform: translateX(-1px) scale(1.08);
        }

        .chevron {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .gallery {
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .gallery img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.24);
        }

        .footer {
            margin-top: 16px;
            text-align: center;
            font-size: 0.84rem;
            color: #dccca3;
        }

        @keyframes rise-in {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float-up {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 620px) {
            .page {
                padding: 22px 14px;
                border-radius: 22px;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .gallery {
                grid-template-columns: 1fr;
            }

            .gallery img {
                height: 190px;
            }
        }
    </style>

    <script>
        const titles = {
            ar: "روابطنا | عمو روبيان",
            en: "Our Links | Amo Robyan"
        };

        function applyLanguage(lang) {
            const activeLang = lang === "en" ? "en" : "ar";

            document.documentElement.lang = activeLang;
            document.documentElement.dir = activeLang === "ar" ? "rtl" : "ltr";
            document.title = titles[activeLang];

            document.querySelectorAll("[data-i18n-ar]").forEach((el) => {
                const nextText = el.getAttribute(`data-i18n-${activeLang}`);
                if (nextText) {
                    el.textContent = nextText;
                }
            });

            document.querySelectorAll("[data-aria-label-ar]").forEach((el) => {
                const nextLabel = el.getAttribute(`data-aria-label-${activeLang}`);
                if (nextLabel) {
                    el.setAttribute("aria-label", nextLabel);
                }
            });

            document.querySelectorAll("[data-alt-ar]").forEach((el) => {
                const nextAlt = el.getAttribute(`data-alt-${activeLang}`);
                if (nextAlt) {
                    el.setAttribute("alt", nextAlt);
                }
            });

            document.querySelectorAll(".chevron").forEach((el) => {
                el.textContent = activeLang === "ar" ? "‹" : "›";
            });

            document.querySelectorAll("[data-lang-btn]").forEach((btn) => {
                btn.classList.toggle("active", btn.getAttribute("data-lang-btn") === activeLang);
            });

            try {
                localStorage.setItem("siteLanguage", activeLang);
            } catch (err) {
                // Ignore storage errors in restricted environments.
            }
        }

        document.querySelectorAll("[data-lang-btn]").forEach((btn) => {
            btn.addEventListener("click", () => {
                applyLanguage(btn.getAttribute("data-lang-btn"));
            });
        });

        let initialLanguage = "ar";
        try {
            const storedLanguage = localStorage.getItem("siteLanguage");
            if (storedLanguage === "ar" || storedLanguage === "en") {
                initialLanguage = storedLanguage;
            } else if (navigator.language && navigator.language.toLowerCase().startsWith("en")) {
                initialLanguage = "en";
            }
        } catch (err) {
            if (navigator.language && navigator.language.toLowerCase().startsWith("en")) {
                initialLanguage = "en";
            }
        }

        applyLanguage(initialLanguage);
    </script>
